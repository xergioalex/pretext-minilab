<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="45%">
      <stop offset="0%" stop-color="#7c6cf0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c6cf0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="3" fill="#7c6cf0" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="600" y="385" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="600" fill="#d8d8e4" text-anchor="middle" letter-spacing="0.3">Programmable Text Layout for the Web</text>

  <!-- Demo count -->
  <text x="600" y="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#a0a0b8" text-anchor="middle">39 interactive demos — powered by @chenglou/pretext (Cheng Lou)</text>

  <!-- API tags row -->
  <rect x="185" y="470" width="160" height="42" rx="8" fill="#1a1a26" stroke="#3a3a50" stroke-width="1.5"/>
  <text x="265" y="498" font-family="ui-monospace, 'SFMono-Regular', monospace" font-size="19" fill="#a99cf8" text-anchor="middle">prepare()</text>

  <rect x="362" y="470" width="145" height="42" rx="8" fill="#1a1a26" stroke="#3a3a50" stroke-width="1.5"/>
  <text x="434" y="498" font-family="ui-monospace, 'SFMono-Regular', monospace" font-size="19" fill="#a99cf8" text-anchor="middle">layout()</text>

  <rect x="524" y="470" width="210" height="42" rx="8" fill="#1a1a26" stroke="#3a3a50" stroke-width="1.5"/>
  <text x="629" y="498" font-family="ui-monospace, 'SFMono-Regular', monospace" font-size="19" fill="#a99cf8" text-anchor="middle">layoutNextLine()</text>

  <rect x="751" y="470" width="220" height="42" rx="8" fill="#1a1a26" stroke="#3a3a50" stroke-width="1.5"/>
  <text x="861" y="498" font-family="ui-monospace, 'SFMono-Regular', monospace" font-size="19" fill="#a99cf8" text-anchor="middle">layoutWithLines()</text>

  <!-- Footer line -->
  <line x1="60" y1="558" x2="1140" y2="558" stroke="#1e1e2e" stroke-width="1"/>

  <!-- Footer text -->
  <text x="60" y="594" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#8888a0">pretext.xergioalex.com</text>
  <text x="1140" y="594" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#8888a0" text-anchor="end">by Sergio Florez (XergioAleX)</text>

  <!-- Bottom accent bar -->
  <rect y="627" width="1200" height="3" fill="#7c6cf0" opacity="0.8"/>
</svg>
